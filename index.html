    text-align: center;
    border-bottom: 2px solid var(--accent);
    position: relative;
    overflow: hidden;
  }
  .hero::before {

    position: absolute; inset: 0;

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    padding: 10px 14px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .header-title { font-family: 'Barlow Condensed', sans-serif; color: var(--accent); font-size: 18px; font-weight: 800; letter-spacing: 1px; }
  .name-tag { background: var(--surface2); border-radius: 20px; padding: 5px 12px; font-size: 13px; color: var(--muted); cursor: pointer; border: 1px solid var(--border); }
  .saving-dot { color: var(--accent); font-size: 11px; }
  .err-dot { color: var(--danger); font-size: 11px; }

  /* ── TABS ── */

  .tab { flex: 1; padding: 11px 4px; border: none; background: transparent; color: var(--muted); font-size: 11px; font-weight: 700; cursor: pointer; border-bottom: 2px solid transparent; font-family: 'Barlow', sans-serif; letter-spacing: 0.5px; text-transform: uppercase; transition: color 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── CARDS ── */
  .card { background: var(--surface); border-radius: 12px; padding: 16px; margin: 8px 10px; border: 1px solid var(--border); }
  .content { flex: 1; padding-bottom: 60px; }

  /* ── NAME SCREEN ── */
  .name-screen { flex: 1; display: flex; flex-direction: column; }
  input, textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 12px 14px; font-size: 15px; width: 100%; font-family: 'Barlow', sans-serif; outline: none; transition: border-color 0.15s; }
  input:focus, textarea:focus { border-color: var(--accent2); }
  .btn { width: 100%; padding: 13px; border-radius: 8px; border: none; font-weight: 800; font-size: 15px; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; text-transform: uppercase; transition: opacity 0.15s; }

  .btn-secondary { background: var(--surface2); color: var(--accent2); border: 1px solid var(--accent2); }

// ─── SCORING ─────────────────────────────────────────────────
function scorePoints(pred, actual) {
  if (!pred || !actual) return null;
  const ph = +pred.h, pa = +pred.a, ah = +actual.h, aa = +actual.a;
  if (isNaN(ph)||isNaN(pa)||isNaN(ah)||isNaN(aa)) return null;
  if (ph===ah && pa===aa) return 5;
  if ((ph-pa)===(ah-aa)) return 3;
  const pr = ph>pa?"H":ph<pa?"A":"D", ar = ah>aa?"H":ah<aa?"A":"D";
  if (pr===ar) return 2;
  return 0;
}

  const app = document.getElementById("app");
  if (state.loading) {
    app.innerHTML = `<div class="loading-screen"><p>Loading…</p></div>`;
    return;
  }
  if (!state.myName) { renderNameScreen(app); return; }
  renderMain(app);
}

function renderNameScreen(app) {
  app.innerHTML = `
    <div class="name-screen">
      <div class="hero">
        <div class="hero-trophy">🏆</div>
        <h1>FIFA 2026<br>Predictor</h1>
        <p>Group Chat Competition</p>
      </div>
      <div class="card" style="margin-top:20px">
        <p style="color:var(--muted);font-size:13px;margin-bottom:12px;text-align:center">Enter your name to join</p>
        <input id="nameInput" type="text" placeholder="Your name (e.g. Essam)" maxlength="20" value="${state.nameInput}" style="margin-bottom:12px"/>
        <button class="btn btn-primary" id="joinBtn">Join the Competition →</button>
        ${state.players.length > 0 ? `<p class="hint">${state.players.length} player${state.players.length>1?"s":""} already in: ${state.players.slice(0,5).join(", ")}${state.players.length>5?"…":""}</p>` : ""}
      </div>
      <p class="footer">Times shown in Bahrain Time (AST)</p>
    </div>`;
  const inp = document.getElementById("nameInput");
  inp.focus();
  inp.addEventListener("input", e => state.nameInput = e.target.value);
  inp.addEventListener("keydown", e => e.key==="Enter" && handleJoin());
  document.getElementById("joinBtn").addEventListener("click", handleJoin);
}

function renderMain(app) {
  const tabs = [["predict","📋 Predict"],["leaderboard","🥇 Standings"],["results","⚽ Results"]];
  app.innerHTML = `
    <div class="header">
      <span class="header-title">🏆 FIFA 2026</span>
      <div style="display:flex;align-items:center;gap:8px">
        ${state.saving ? `<span class="saving-dot">saving…</span>` : ""}
        ${state.saveErr ? `<span class="err-dot">⚠ error</span>` : ""}
        <span class="name-tag" id="nameTap">👤 ${state.myName}</span>
      </div>
    </div>
    <div class="tabs">
      ${tabs.map(([id,label])=>`<button class="tab${state.tab===id?" active":""}" data-tab="${id}">${label}</button>`).join("")}
    </div>
    ${state.adminMode ? `<div class="admin-banner">⚙ ADMIN MODE — enter match results in Results tab</div>` : ""}
    <div class="content" id="tabContent"></div>
    <p class="footer">Times in Bahrain Time (AST) · Share this link with your group!</p>`;

  document.querySelectorAll(".tab").forEach(btn =>
    btn.addEventListener("click", () => { state.tab = btn.dataset.tab; render(); })
  );

  let taps = state.adminTaps;
  document.getElementById("nameTap").addEventListener("click", () => {
    taps++; state.adminTaps = taps;
    if (taps >= 5) { state.adminMode = !state.adminMode; state.adminTaps = 0; render(); }
  });

  renderTab();
}

function renderTab() {
  const el = document.getElementById("tabContent");
  if (!el) return;
  if (state.tab==="predict") renderPredict(el);
  else if (state.tab==="leaderboard") renderLeaderboard(el);
  else renderResults(el);
}

// ── PREDICT ──
function renderPredict(el) {
  const groups = ["ALL","A","B","C","D","E","F","G","H","I","J","K","L"];
  el.innerHTML = `
    <div class="filter-row">
      <select id="fStatus">
        <option value="upcoming"${state.filterStatus==="upcoming"?" selected":""}>🔓 Upcoming</option>
        <option value="past"${state.filterStatus==="past"?" selected":""}>🔒 Past / Live</option>
        <option value="all"${state.filterStatus==="all"?" selected":""}>📅 All</option>
      </select>
      <select id="fGroup">
        ${groups.map(g=>`<option value="${g}"${state.filterGroup===g?" selected":""}>Group ${g}</option>`).join("")}
      </select>
    </div>
    <div id="matchList"></div>`;

  document.getElementById("fStatus").addEventListener("change", e => { state.filterStatus=e.target.value; renderTab(); });
  document.getElementById("fGroup").addEventListener("change", e => { state.filterGroup=e.target.value; renderTab(); });

  const filtered = MATCHES.filter(m => {
    const grp = state.filterGroup==="ALL" || m.group===state.filterGroup;
    const locked = isLocked(m.kickoff);
    if (state.filterStatus==="upcoming") return grp && !locked;
    if (state.filterStatus==="past") return grp && locked;
    return grp;
  });

  const list = document.getElementById("matchList");
  if (filtered.length===0) { list.innerHTML=`<div class="empty-msg">No matches in this filter 👀</div>`; return; }

  const byDate = groupByDate(filtered);
  let html = "";
  for (const [date, matches] of Object.entries(byDate)) {
    html += `<div class="date-divider">${date}</div>`;
    matches.forEach(m => { html += matchCardHTML(m); });
  }
  list.innerHTML = html;
  attachMatchCardEvents(filtered);
}

function matchCardHTML(m) {
  const locked = isLocked(m.kickoff);
  const pred = state.predictions[m.id]?.[state.myName];
  const result = state.results[m.id];
  const pts = scorePoints(pred, result);
  const ptsColor = pts===5?"var(--accent)":pts===3?"var(--accent3)":pts===2?"var(--accent2)":"var(--danger)";
  const ptsLabel = pts===5?"🎯 +5":pts===3?"📐 +3":pts===2?"✅ +2":"❌ 0";
  const predCount = Object.keys(state.predictions[m.id]||{}).length;

  return `<div class="match-card${locked?" locked":""}" data-id="${m.id}">
    <div class="match-meta">
      <span class="badge badge-group">Grp ${m.group}</span>
      <span class="badge-time">${fmtTime(m.kickoff)}</span>
      ${result ? `<span class="badge-final" style="margin-left:auto">✅ Final</span>` : locked ? `<span class="badge-lock" style="margin-left:auto">🔒 Locked</span>` : ""}
    </div>
    <div class="teams-row">
      <div class="team-box"><span class="team-flag">${flag(m.home)}</span><span class="team-name">${m.home}</span></div>
      <span class="vs">VS</span>
      <div class="team-box"><span class="team-flag">${flag(m.away)}</span><span class="team-name">${m.away}</span></div>
    </div>
    ${result ? `
      <div class="result-display">
        <span class="result-score">${result.h} – ${result.a}</span>
        ${pts!==null ? `<span class="pts-badge" style="color:${ptsColor};border-color:${ptsColor}">${ptsLabel} pts</span>` : ""}
      </div>` : ""}
    ${!locked ? `
      <div class="pred-row">
        <input class="score-input" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0" maxlength="2"
          value="${pred?.h??""}" data-match="${m.id}" data-side="h"/>
        <span class="dash">—</span>
        <input class="score-input" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="0" maxlength="2"
          value="${pred?.a??""}" data-match="${m.id}" data-side="a"/>
        <button class="btn-save${pred?" saved":""}" data-match="${m.id}">${pred?"✓ Saved":"Save"}</button>
      </div>` : `
      <div class="my-pred-locked">
        ${pred ? `Your pick: <b>${pred.h} – ${pred.a}</b>` : `<span style="color:var(--muted)">No prediction placed</span>`}
      </div>`}
    <div class="pred-count">${predCount} prediction${predCount!==1?"s":""} placed</div>
    ${state.adminMode && locked ? `
      <div class="admin-row">
        <span class="admin-label">Score:</span>
        <input class="admin-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2"
          value="${result?.h??""}" data-match="${m.id}" data-side="rh"/>
        <span style="color:var(--muted)">–</span>
        <input class="admin-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2"
          value="${result?.a??""}" data-match="${m.id}" data-side="ra"/>
        <button class="btn-admin" data-match="${m.id}" data-action="setresult">Set</button>
      </div>` : ""}
  </div>`;
}

function attachMatchCardEvents(matches) {
  // Save prediction buttons
  document.querySelectorAll(".btn-save").forEach(btn => {
    btn.addEventListener("click", () => {
      const mid = btn.dataset.match;
      const hEl = document.querySelector(`.score-input[data-match="${mid}"][data-side="h"]`);
      const aEl = document.querySelector(`.score-input[data-match="${mid}"][data-side="a"]`);
      if (!hEl||!aEl||hEl.value===""||aEl.value==="") return;
      handleSavePred(mid, hEl.value.replace(/\D/g,""), aEl.value.replace(/\D/g,""), btn);
    });
  });
  // Score inputs — numeric only
  document.querySelectorAll(".score-input").forEach(inp => {
    inp.addEventListener("input", e => { e.target.value = e.target.value.replace(/\D/g,""); });
    inp.addEventListener("keydown", e => {
      if (e.key==="Enter") {
        const mid = inp.dataset.match;
        document.querySelector(`.btn-save[data-match="${mid}"]`)?.click();
      }
    });
  });
  // Admin set result
  document.querySelectorAll(".btn-admin[data-action='setresult']").forEach(btn => {
    btn.addEventListener("click", () => {
      const mid = btn.dataset.match;
      const rh = document.querySelector(`.admin-input[data-match="${mid}"][data-side="rh"]`)?.value;
      const ra = document.querySelector(`.admin-input[data-match="${mid}"][data-side="ra"]`)?.value;
      if (rh===""||ra==="") return;
      handleSaveResult(mid, rh, ra);
    });
  });
  // Admin inputs numeric
  document.querySelectorAll(".admin-input").forEach(inp => {
    inp.addEventListener("input", e => { e.target.value = e.target.value.replace(/\D/g,""); });
  });
}

// ── LEADERBOARD ──
function renderLeaderboard(el) {
  const lb = state.players.map(p => {
    let pts=0, exact=0, diff=0, correct=0;
    MATCHES.forEach(m => {
      const s = scorePoints(state.predictions[m.id]?.[p], state.results[m.id]);
      if (s===null) return;
      pts+=s;
      if(s===5)exact++;
      else if(s===3)diff++;
      else if(s===2)correct++;
    });
    return {name:p,pts,exact,diff,correct};
  }).sort((a,b)=>b.pts-a.pts||b.exact-a.exact||b.diff-a.diff);

  const medals = ["🥇","🥈","🥉"];
  el.innerHTML = `
    <div class="card">
      <div class="score-key">
        <span>🎯 Exact score = <b style="color:var(--accent)">5 pts</b></span>
        <span>📐 Correct goal difference = <b style="color:var(--accent3)">3 pts</b></span>
        <span>✅ Correct winner/draw = <b style="color:var(--accent2)">2 pts</b></span>
        <span>❌ Wrong = <b style="color:var(--danger)">0 pts</b></span>
      </div>
    </div>
    ${lb.length===0 ? `<div class="empty-msg">No players yet!</div>` : ""}
    ${lb.map((p,i)=>`
      <div class="lb-row${p.name===state.myName?" me":""}">
        <div class="lb-rank">${medals[i]||"#"+(i+1)}</div>
        <div class="lb-name">${p.name}${p.name===state.myName?" <span style='color:var(--muted);font-size:11px'>(you)</span>":""}</div>
        <div style="text-align:right">
          <span class="lb-pts">${p.pts}</span><span style="color:var(--muted);font-size:12px"> pts</span>
          <div class="lb-breakdown">${p.exact}🎯 ${p.diff}📐 ${p.correct}✅</div>
        </div>
      </div>`).join("")}`;
}

// ── RESULTS ──
function renderResults(el) {
  const past = MATCHES.filter(m => isLocked(m.kickoff));
  if (past.length===0) { el.innerHTML=`<div class="empty-msg">Tournament hasn't started yet! 🗓️</div>`; return; }

  el.innerHTML = past.map(m => {
    const result = state.results[m.id];
    const pred = state.predictions[m.id]?.[state.myName];
    const pts = scorePoints(pred, result);
    const ptsColor = pts===5?"var(--accent)":pts===3?"var(--accent3)":pts===2?"var(--accent2)":"var(--danger)";
    const ptsLabel = pts===5?"🎯 +5":pts===3?"📐 +3":pts===2?"✅ +2":"❌ 0";
    return `<div class="result-row">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="badge badge-group">Grp ${m.group}</span>
        <span style="color:var(--muted);font-size:11px">${fmtDate(m.kickoff)}</span>
      </div>
      <div class="result-teams-sm">
        <span>${flag(m.home)} ${m.home}</span>
        <span style="color:var(--accent);font-weight:900;font-size:20px;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px">
          ${result ? `${result.h} – ${result.a}` : "– –"}
        </span>
        <span>${m.away} ${flag(m.away)}</span>
      </div>
      ${pred ? `
        <div class="my-pred-locked" style="display:flex;justify-content:space-between">
          <span>Your pick: ${pred.h}–${pred.a}</span>
          ${pts!==null ? `<span style="color:${ptsColor};font-weight:700">${ptsLabel}</span>` : ""}
        </div>` : ""}
      ${state.adminMode ? `
        <div class="admin-row">
          <span class="admin-label">Score:</span>
          <input class="admin-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2"
            value="${result?.h??""}" data-match="${m.id}" data-side="rh"/>
          <span style="color:var(--muted)">–</span>
          <input class="admin-input" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2"
            value="${result?.a??""}" data-match="${m.id}" data-side="ra"/>
          <button class="btn-admin result-set-btn" data-match="${m.id}">Set</button>
        </div>` : ""}
    </div>`;
  }).join("");

  document.querySelectorAll(".admin-input").forEach(inp =>
    inp.addEventListener("input", e => { e.target.value = e.target.value.replace(/\D/g,""); })
  );
  document.querySelectorAll(".result-set-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const mid = btn.dataset.match;
      const rh = document.querySelector(`.admin-input[data-match="${mid}"][data-side="rh"]`)?.value;
      const ra = document.querySelector(`.admin-input[data-match="${mid}"][data-side="ra"]`)?.value;
      if (rh===""||ra==="") return;
      handleSaveResult(mid, rh, ra);
    });
  });
}

// ─── ACTIONS ─────────────────────────────────────────────────
async function loadAll() {
  try {
    const data = await apiCall("/game");
    state.players = data.players || [];
    state.predictions = data.predictions || {};
    state.results = data.results || {};
  } catch(e) { console.error("loadAll:", e); }
  state.loading = false;
  render();
}

async function handleJoin() {
  const name = (state.nameInput || document.getElementById("nameInput")?.value || "").trim();
  if (!name) return;
  try {
    const data = await apiCall("/join", "POST", { name });
    state.players = data.players || state.players;
    if (!state.players.includes(name)) state.players.push(name);
    state.myName = name;
    localStorage.setItem("fifa26_name", name);
    render();
  } catch(e) {
    // Still allow local join if API fails
    state.myName = name;
    localStorage.setItem("fifa26_name", name);
    render();
  }
}

async function handleSavePred(matchId, h, a, btn) {
  state.saving = true;
  if (btn) { btn.textContent="Saving…"; btn.disabled=true; }
  try {
    await apiCall("/predict", "POST", { name: state.myName, matchId, h: +h, a: +a });
    if (!state.predictions[matchId]) state.predictions[matchId] = {};
    state.predictions[matchId][state.myName] = {h:+h, a:+a};
    state.saveErr = false;
    if (btn) { btn.textContent="✓ Saved"; btn.classList.add("saved"); }
  } catch(e) {
    state.saveErr = true;
    if (btn) { btn.textContent="Save"; btn.disabled=false; }
  }
  state.saving = false;
  // Update just the header status without full re-render
  const savingEl = document.querySelector(".saving-dot");
  if (savingEl) savingEl.remove();
}

async function handleSaveResult(matchId, h, a) {
  state.saving = true;
  try {
    await apiCall("/result", "POST", { matchId, h: +h, a: +a });
    state.results[matchId] = {h:+h, a:+a};
    state.saveErr = false;
    renderTab();
  } catch(e) { state.saveErr = true; }
  state.saving = false;
}

// ─── POLL FOR UPDATES ─────────────────────────────────────────
setInterval(async () => {
  try {
    const data = await apiCall("/game");
    state.players = data.players || [];
    state.predictions = data.predictions || {};
    state.results = data.results || {};
    if (state.myName) renderTab();
  } catch(e) {}
}, 15000);

// ─── INIT ─────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
